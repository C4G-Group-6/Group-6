{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ResourceConnect{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@400&display=swap"
    rel="stylesheet"
  />
  
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'nav-bg': '#1F452D',
            'button-bg': '#ADD6C5',
          },
          fontFamily: {
            'heading': ['Inter', '-apple-system', 'Roboto', 'Helvetica', 'sans-serif'],
            'subtitle': ['Oswald', '-apple-system', 'Roboto', 'Helvetica', 'sans-serif'],
          },
        },
      },
    }
  </script>

  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="site-shell">
    {% include 'partials/navbar.html' %}
    {% block content %}{% endblock %}
    {% include 'partials/footer.html' %}
  </div>
  {% block extra_js %}{% endblock %}
  <script defer src="{% static 'js/alpine.js' %}"></script>
</body>
</html>
